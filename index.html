<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Link Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #1DB954, #fc3c44);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .converter {
      width: 100%;
      max-width: 500px;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      padding: 0.85rem 1rem;
      border: 1px solid #333;
      border-radius: 12px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #555; }
    input::placeholder { color: #555; }

    button {
      padding: 0.85rem 1.25rem;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .convert-btn {
      background: linear-gradient(135deg, #1DB954, #1ed760);
      color: #000;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #888;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #333;
      border-top-color: #1DB954;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .song-info {
      display: flex;
      gap: 1rem;
      padding: 1.25rem;
      align-items: center;
    }

    .song-info img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: #2a2a2a;
    }

    .song-details h3 {
      font-size: 1.05rem;
      margin-bottom: 0.2rem;
      color: #fff;
    }

    .song-details p {
      color: #888;
      font-size: 0.9rem;
    }

    .links {
      border-top: 1px solid #2a2a2a;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .platform-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .platform-icon.spotify { background: #1DB954; color: #000; }
    .platform-icon.apple { background: #fc3c44; color: #fff; }

    .link-row a {
      color: #bbb;
      text-decoration: none;
      font-size: 0.85rem;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-row a:hover { color: #fff; }

    .copy-btn {
      background: #2a2a2a;
      color: #e0e0e0;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .copy-btn.copied {
      background: #1DB954;
      color: #000;
    }

    .error {
      background: #2a1515;
      border: 1px solid #4a2020;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      color: #ff6b6b;
      font-size: 0.9rem;
      animation: fadeIn 0.3s ease;
    }

    .search-results {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      animation: fadeIn 0.3s ease;
    }

    .search-results-label {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 0.25rem;
    }

    .search-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-item:hover {
      border-color: #444;
      background: #222;
    }

    .search-item img {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    .search-item-info h4 {
      font-size: 0.9rem;
      color: #fff;
      margin-bottom: 0.1rem;
      font-weight: 500;
    }

    .search-item-info p {
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Music Link Converter</h1>
  <p class="subtitle">Spotify &harr; Apple Music</p>

  <div class="converter">
    <div class="input-group">
      <input
        type="text"
        id="urlInput"
        placeholder="Paste a link or search for a song..."
        autofocus
      />
      <button class="convert-btn" id="convertBtn" onclick="convert()">Convert</button>
    </div>
    <div id="output"></div>
  </div>


  <script>
    const input = document.getElementById('urlInput');
    const output = document.getElementById('output');
    const convertBtn = document.getElementById('convertBtn');

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') convert();
    });

    // Auto-convert when pasting a URL
    input.addEventListener('paste', (e) => {
      setTimeout(() => {
        if (isUrl(input.value.trim())) convert();
      }, 100);
    });

    async function fetchWithRetry(url, retries = 3) {
      const baseUrl = `/api/convert?url=${encodeURIComponent(url)}`;

      for (let i = 0; i < retries; i++) {
        const res = await fetch(baseUrl);

        if (res.ok) return res.json();

        if (res.status === 429) {
          if (i < retries - 1) {
            output.innerHTML = '<div class="loading"><div class="spinner"></div><br>Rate limited, retrying...</div>';
            await new Promise(r => setTimeout(r, 2000 * (i + 1)));
            continue;
          }
          throw new Error('Rate limited by Songlink API. Please wait a moment and try again.');
        }

        if (res.status === 404) {
          throw new Error('Song not found. The link may be invalid or the song may not be available on other platforms.');
        }

        let detail = '';
        try { const body = await res.json(); detail = body.code || ''; } catch {}
        throw new Error(`API error (${res.status}${detail ? ': ' + detail : ''}). Please check the link and try again.`);
      }
    }

    function isUrl(str) {
      return /^https?:\/\//.test(str) || str.includes('open.spotify.com') || str.includes('music.apple.com') || str.includes('spotify.link');
    }

    async function convert() {
      const val = input.value.trim();
      if (!val) return;

      output.innerHTML = '<div class="loading"><div class="spinner"></div><br>Finding your song...</div>';
      convertBtn.disabled = true;

      try {
        if (isUrl(val)) {
          const data = await fetchWithRetry(val);
          render(data);
        } else {
          await search(val);
        }
      } catch (err) {
        output.innerHTML = `<div class="error">${err.message || 'Something went wrong. Please try again.'}</div>`;
      } finally {
        convertBtn.disabled = false;
      }
    }

    async function search(query) {
      const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
      if (!res.ok) throw new Error('Search failed. Please try again.');
      const data = await res.json();

      if (!data.results?.length) {
        output.innerHTML = '<div class="error">No results found. Try a different search.</div>';
        return;
      }

      let html = '<div class="search-results">';
      html += '<p class="search-results-label">Pick a song:</p>';

      for (const item of data.results) {
        html += `<div class="search-item" onclick="selectTrack('${escapeAttr(item.spotifyUrl)}')">
          <img src="${item.thumbnail}" alt="" />
          <div class="search-item-info">
            <h4>${escapeHtml(item.title)}</h4>
            <p>${escapeHtml(item.artist)}</p>
          </div>
        </div>`;
      }

      html += '</div>';
      output.innerHTML = html;
    }

    async function selectTrack(spotifyUrl) {
      output.innerHTML = '<div class="loading"><div class="spinner"></div><br>Getting links...</div>';
      try {
        const data = await fetchWithRetry(spotifyUrl);
        render(data);
      } catch (err) {
        output.innerHTML = `<div class="error">${err.message || 'Something went wrong.'}</div>`;
      }
    }

    function render(data) {
      if (data.error) {
        output.innerHTML = `<div class="error">${escapeHtml(data.error)}</div>`;
        return;
      }

      const { title, artist, thumbnail, spotifyUrl, appleUrl } = data;

      let html = '<div class="result">';

      // Song info
      html += '<div class="song-info">';
      if (thumbnail) {
        html += `<img src="${thumbnail}" alt="Album art" />`;
      }
      html += `<div class="song-details">
        <h3>${escapeHtml(title || 'Unknown Title')}</h3>
        <p>${escapeHtml(artist || 'Unknown Artist')}</p>
      </div></div>`;

      // Links
      html += '<div class="links">';

      if (spotifyUrl) {
        html += `<div class="link-row">
          <div class="platform-icon spotify">S</div>
          <a href="${spotifyUrl}" target="_blank" rel="noopener">${spotifyUrl}</a>
          <button class="copy-btn" onclick="copyLink(this, '${escapeAttr(spotifyUrl)}')">Copy</button>
        </div>`;
      } else {
        const searchUrl = `https://open.spotify.com/search/${encodeURIComponent(title + ' ' + artist)}`;
        html += `<div class="link-row">
          <div class="platform-icon spotify">S</div>
          <a href="${searchUrl}" target="_blank" rel="noopener">Search on Spotify</a>
          <button class="copy-btn" onclick="copyLink(this, '${escapeAttr(searchUrl)}')">Copy</button>
        </div>`;
      }

      if (appleUrl) {
        html += `<div class="link-row">
          <div class="platform-icon apple">A</div>
          <a href="${appleUrl}" target="_blank" rel="noopener">${appleUrl}</a>
          <button class="copy-btn" onclick="copyLink(this, '${escapeAttr(appleUrl)}')">Copy</button>
        </div>`;
      } else {
        const searchUrl = `https://music.apple.com/search?term=${encodeURIComponent(title + ' ' + artist)}`;
        html += `<div class="link-row">
          <div class="platform-icon apple">A</div>
          <a href="${searchUrl}" target="_blank" rel="noopener">Search on Apple Music</a>
          <button class="copy-btn" onclick="copyLink(this, '${escapeAttr(searchUrl)}')">Copy</button>
        </div>`;
      }

      html += '</div></div>';
      output.innerHTML = html;
    }

    async function copyLink(btn, url) {
      try {
        await navigator.clipboard.writeText(url);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      } catch {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
